function GS({t}) {
  return <style>{`
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:${t.bg};color:${t.tx};font-family:'Noto Sans KR',sans-serif}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:${t.bg}}
    ::-webkit-scrollbar-thumb{background:${t.bdr2};border-radius:3px}
    .sb{transition:transform .22s cubic-bezier(.175,.885,.32,1.275),background .25s ease,box-shadow .25s ease,border-color .25s ease,color .25s ease,opacity .25s ease;cursor:pointer;position:relative;overflow:hidden}
    .sb::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at var(--rx,50%) var(--ry,50%),rgba(255,255,255,.35) 0%,transparent 60%);opacity:0;transition:opacity .4s ease;pointer-events:none;border-radius:inherit}
    .sb:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 4px 16px rgba(0,0,0,.08)}
    .sb:active{transform:scale(.92) translateY(0);transition-duration:.1s}
    .sb:active::after{opacity:1;transition-duration:.05s}
    .ct{transition:all .28s cubic-bezier(.175,.885,.32,1.275);cursor:pointer}
    .ct:hover{transform:translateX(5px);background:var(--ct-hover-bg,transparent)}
    .fs{animation:fs .5s cubic-bezier(.175,.885,.32,1.275) both}
    @keyframes fs{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .pi{animation:pi .5s cubic-bezier(.175,.885,.32,1.275) both}

// ── SHARED COMPONENTS ─────────────────────────────────────────────────────────
const KW = new Set(["struct","class","func","var","let","return","if","else","guard","print","self","true","false","nil","weak","in","async","await","actor","@MainActor","@State","@Binding","@ObservedObject","@StateObject","@EnvironmentObject","@Published","@main","body","View","Timer","Task","throws","try","do","catch","override","super","protocol","extension","delegate","required","init","deinit","viewDidLoad","viewWillAppear","viewDidAppear","viewWillDisappear","viewDidDisappear","DispatchQueue","NotificationCenter","ObservableObject"]);

function Code({code,t}) {
  return (
    <div className="cb" style={{background:t.codBg,border:`1px solid ${t.codBdr}`,color:t.cod}}>
      {code.split("\n").map((line,i)=>{
        if(line.trim().startsWith("//")) return <div key={i} style={{color:t.tx3,fontStyle:"italic"}}>{line}</div>;
        return <div key={i}>{line.split(/(\b\w[\w.]*\b|@\w+|"[^"]*"|\d+)/).map((p,j)=>{
          if(KW.has(p)) return <span key={j} style={{color:"#e879f9",fontWeight:600}}>{p}</span>;
          if(/^"[^"]*"$/.test(p)) return <span key={j} style={{color:"#10b981"}}>{p}</span>;
          if(/^\d+$/.test(p)) return <span key={j} style={{color:"#f59e0b"}}>{p}</span>;
          if(/^[A-Z]\w+$/.test(p)&&p.length>1) return <span key={j} style={{color:"#60a5fa"}}>{p}</span>;
          if(p.startsWith("@")) return <span key={j} style={{color:"#a78bfa"}}>{p}</span>;
          return p;
        })}</div>;
      })}
    </div>
  );
}

function Panel({children,t,style={}}) {
  const [hov,setHov]=useState(false);
  return <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{background:t.sur,border:`1.5px solid ${hov?t.bdr2:t.bdr}`,borderRadius:18,padding:22,display:"flex",flexDirection:"column",gap:14,boxShadow:hov?`0 8px 32px ${t.sha},0 2px 8px ${t.sha}`:`0 2px 18px ${t.sha}`,transition:"border-color .35s ease, box-shadow .45s cubic-bezier(.4,0,.2,1), transform .35s cubic-bezier(.175,.885,.32,1.275)",transform:hov?"translateY(-2px)":"translateY(0)",...style}}>{children}</div>;
}

function Btn({children,t,color,onClick,disabled,full,style:ex={}}) {
  const handleClick=(e)=>{
    if(disabled)return;
    const rect=e.currentTarget.getBoundingClientRect();
    const x=((e.clientX-rect.left)/rect.width*100).toFixed(0);
    const y=((e.clientY-rect.top)/rect.height*100).toFixed(0);
    e.currentTarget.style.setProperty('--rx',x+'%');
    e.currentTarget.style.setProperty('--ry',y+'%');
    onClick&&onClick(e);
  };
  return <button className="sb" onClick={handleClick} disabled={disabled} style={{background:`${color}18`,color,border:`1.5px solid ${color}50`,borderRadius:11,padding:"9px 18px",fontSize:13,fontWeight:600,cursor:disabled?"default":"pointer",opacity:disabled?.4:1,width:full?"100%":"auto",...ex}}>{children}</button>;
}

function Tag({label,color,bg,brd}) {
  return <span className="tg" style={{background:bg,color,border:`1px solid ${brd}`}}>{label}</span>;
}

function MBox({label,value,color,bg,brd,glow}) {
  return <div className="mb" style={{background:bg,borderColor:brd,boxShadow:glow?`0 0 0 4px ${color}30,0 8px 28px ${color}20`:"none",transition:"all .45s cubic-bezier(.175,.885,.32,1.275)"}}>
    <div style={{color:"#888",fontSize:10,marginBottom:5,fontFamily:"monospace",transition:"color .3s"}}>{label}</div>
    <div style={{color,fontFamily:"monospace",fontSize:26,fontWeight:700,transition:"all .35s cubic-bezier(.175,.885,.32,1.275)"}}>{value}</div>
  </div>;
}

function Grid2({children,t}) {
  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>{children}</div>;
}

function Arrow({color,dir="→"}) {
  return <div style={{color,fontSize:22,lineHeight:1}}>{dir}</div>;
}

function FlowNode({t,color,bg,brd,label,sub,small}) {
  const [hov,setHov]=useState(false);
  return <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{background:bg,border:`1.5px solid ${brd}`,borderRadius:10,padding:small?"7px 13px":"10px 22px",textAlign:"center",transition:"all .35s cubic-bezier(.175,.885,.32,1.275)",transform:hov?"scale(1.05) translateY(-1px)":"scale(1)",boxShadow:hov?`0 4px 16px ${color}20`:"none"}}>
    <div style={{color,fontWeight:600,fontSize:small?11:14,transition:"color .3s"}}>{label}</div>
    {sub&&<div style={{color:t.tx3,fontSize:10,fontFamily:"monospace",marginTop:2,transition:"color .3s"}}>{sub}</div>}
  </div>;
}

function InfoBox({t,color,bg,brd,children}) {
  return <div className="pi" style={{background:bg,border:`1px solid ${brd}`,borderRadius:11,padding:"11px 14px",color,fontSize:13,lineHeight:1.65}}>{children}</div>;
}

  };

// 7. ARC
function ArcDemo({t,s}) {
  const [objects,setObjects]=useState([]);
  const [id,setId]=useState(1);
  const addObj=()=>{setObjects(o=>[...o,{id:id,rc:1,name:`Object\u00A0${id}`}]);setId(i=>i+1)};
  const addRef=(objId)=>setObjects(o=>o.map(x=>x.id===objId?{...x,rc:x.rc+1}:x));
  const removeRef=(objId)=>setObjects(o=>{const next=o.map(x=>x.id===objId?{...x,rc:x.rc-1}:x);return next.filter(x=>x.rc>0)});
  const reset=()=>{setObjects([]);setId(1)};
  return <div className="fs" style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
      <Btn t={t} color={t.blue} onClick={addObj}>+ 객체 생성</Btn>
      <Btn t={t} color={t.tx2} onClick={reset}>↺ 초기화</Btn>
    </div>
    <Grid2 t={t}>
      <Panel t={t}>
        <div style={{fontWeight:600,fontSize:14}}>힙 메모리 영역</div>
        {objects.length===0&&<div style={{color:t.tx3,fontSize:13,textAlign:"center",padding:"20px 0"}}>객체가 없음 — "객체 생성"을 눌러보세요</div>}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {objects.map(obj=>{
            const pct=Math.min(obj.rc/5,1);
            const barColor=obj.rc>=3?t.red:obj.rc>=2?t.amb:t.grn;
            return <div key={obj.id} className="pi" style={{background:t.sur2,border:`1.5px solid ${barColor}60`,borderRadius:12,padding:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontFamily:"monospace",fontSize:13,fontWeight:600}}>{obj.name}</span>
                <span style={{color:barColor,fontFamily:"monospace",fontSize:13,fontWeight:700}}>RC: {obj.rc}</span>
              </div>
              <div style={{background:t.bdr,borderRadius:6,height:8,marginBottom:10}}>
                <div style={{width:`${pct*100}%`,height:"100%",background:barColor,borderRadius:6,transition:"all .5s cubic-bezier(.175,.885,.32,1.275)"}}/>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button className="sb" onClick={()=>addRef(obj.id)} style={{background:t.blueBg,color:t.blue,border:`1px solid ${t.blueBrd}`,borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:600}}>+ 참조 추가</button>
                <button className="sb" onClick={()=>removeRef(obj.id)} style={{background:t.redBg,color:t.red,border:`1px solid ${t.redBrd}`,borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:600}}>- 참조 해제</button>
              </div>
              {obj.rc===1&&<div style={{color:t.grn,fontSize:11,marginTop:6}}>🟢 RC=1 · 살아있음</div>}
              {obj.rc>=3&&<div style={{color:t.red,fontSize:11,marginTop:6}}>🔴 참조가 많음 — 의도한 설계인지 확인!</div>}
            </div>;
          })}
        </div>
        {objects.some(o=>o.rc<=0)&&<InfoBox t={t} color={t.grn} bg={t.grnBg} brd={t.grnBrd}>✅ RC=0 → ARC가 자동으로 메모리 해제!</InfoBox>}
      </Panel>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Code t={t} code={`class Dog {
    var name: String
    init(_ name: String) {
        self.name = name
        print("\\(name) 생성됨")  // RC: 1
    }
    deinit {
        print("\\(name) 해제됨")  // RC: 0
    }
}

var dog1: Dog? = Dog("멍멍")  // RC: 1
var dog2 = dog1              // RC: 2
dog1 = nil                   // RC: 1
dog2 = nil                   // RC: 0 → 해제!`}/>
        <InfoBox t={t} color={t.blue} bg={t.blueBg} brd={t.blueBrd}>
          <b>ARC (Automatic Reference Counting)</b><br/>
          참조 횟수(RC)가 0이 되는 순간 메모리 자동 해제.<br/>
          직접 malloc/free 없이 안전하게 관리.
        </InfoBox>
      </div>
    </Grid2>
  </div>;
}

protocol TextFieldDelegate: AnyObject {
    func textFieldDidChange(_ text: String)
}

// 2. 이벤트 발생 객체
class UITextField {
    weak var delegate: TextFieldDelegate?

    func userTyped(_ text: String) {
        // 위임! 구현은 delegate에게
        delegate?.textFieldDidChange(text)
    }
}

// 3. 위임받은 객체가 구현
class ViewController: TextFieldDelegate {
    func textFieldDidChange(_ text: String) {
        print("입력됨: \\(text)")

    }
}`}/>

}

function LifecycleDemo({t,s}) {
  const [phase,setPhase]=useState(-1);
  const [auto,setAuto]=useState(false);
  const timerRef=useRef(null);
  const phases=[
    {name:"init",label:"초기화",sub:"ViewController 객체 생성",color:t.blue,bg:t.blueBg,brd:t.blueBrd,code:"init(coder:) 호출\n뷰 계층 아직 없음"},
    {name:"viewDidLoad",label:"viewDidLoad",sub:"뷰 계층 메모리 로드 완료",color:t.grn,bg:t.grnBg,brd:t.grnBrd,code:"viewDidLoad()\n→ API 호출, 초기 설정"},
    {name:"viewWillAppear",label:"viewWillAppear",sub:"화면 나타나기 직전",color:t.amb,bg:t.ambBg,brd:t.ambBrd,code:"viewWillAppear(_:)\n→ 애니메이션 준비"},
    {name:"viewDidAppear",label:"viewDidAppear",sub:"화면 완전히 표시됨",color:t.pur,bg:t.purBg,brd:t.purBrd,code:"viewDidAppear(_:)\n→ 타이머 시작, 추적"},
    {name:"viewWillDisappear",label:"viewWillDisappear",sub:"화면 사라지기 직전",color:t.amb,bg:t.ambBg,brd:t.ambBrd,code:"viewWillDisappear(_:)\n→ 타이머 정지"},
    {name:"viewDidDisappear",label:"viewDidDisappear",sub:"화면 완전히 사라짐",color:t.red,bg:t.redBg,brd:t.redBrd,code:"viewDidDisappear(_:)\n→ 리소스 정리"},
    {name:"deinit",label:"deinit",sub:"메모리에서 해제",color:t.tx3,bg:t.sur2,brd:t.bdr2,code:"deinit\n→ ARC RC=0, 해제"},
  ];
  const next=()=>setPhase(p=>Math.min(p+1,phases.length-1));
  const prev=()=>setPhase(p=>Math.max(p-1,0));
  const resetP=()=>{setPhase(-1);setAuto(false);clearInterval(timerRef.current)};
  useEffect(()=>{
    if(auto){timerRef.current=setInterval(()=>setPhase(p=>{if(p>=phases.length-1){clearInterval(timerRef.current);setAuto(false);return p;}return p+1;}),900);}
    return()=>clearInterval(timerRef.current);
  },[auto]);
  const cur=phase>=0?phases[phase]:null;
  return <div className="fs" style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
      <Btn t={t} color={t.blue} onClick={()=>{resetP();setTimeout(()=>setPhase(0),50)}}>▶ 처음부터</Btn>
      <Btn t={t} color={t.grn} onClick={()=>setAuto(v=>!v)} style={{opacity:auto?1:.6}}>{auto?"⏸ 일시정지":"▶▶ 자동 재생"}</Btn>
      <Btn t={t} color={t.tx2} onClick={prev} disabled={phase<=0}>◀ 이전</Btn>
      <Btn t={t} color={t.blue} onClick={next} disabled={phase>=phases.length-1}>다음 ▶</Btn>
      <Btn t={t} color={t.tx2} onClick={resetP}>↺</Btn>
    </div>
    <Grid2 t={t}>
      <Panel t={t}>
        <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>생애주기 타임라인</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {phases.map((p,i)=>(
            <div key={i} className={phase===i?"pi":""} style={{background:phase===i?p.bg:phase>i?`${p.bg}80`:t.sur2,border:`1.5px solid ${phase===i?p.brd:phase>i?`${p.brd}60`:t.bdr}`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,transition:"all .35s cubic-bezier(.34,1.2,.64,1)"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:phase>=i?p.color:t.bdr2,flexShrink:0,transition:"background .3s"}}/>
              <div>
                <div style={{color:phase===i?p.color:phase>i?p.color:t.tx2,fontFamily:"monospace",fontSize:12,fontWeight:600}}>{p.label}</div>
                <div style={{color:t.tx3,fontSize:10,marginTop:2}}>{p.sub}</div>
              </div>
              {phase===i&&<div style={{marginLeft:"auto",color:p.color,fontSize:14}}>◀ 지금</div>}
            </div>
          ))}
        </div>
      </Panel>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {cur?<>
          <div className="pi" style={{background:cur.bg,border:`2px solid ${cur.brd}`,borderRadius:14,padding:16}}>
            <div style={{color:cur.color,fontFamily:"monospace",fontSize:16,fontWeight:700,marginBottom:8}}>{cur.label}()</div>
            <div style={{color:t.tx2,fontSize:13,lineHeight:1.7}}>{cur.sub}</div>
            <div style={{background:t.codBg,borderRadius:8,padding:"10px 12px",fontFamily:"monospace",fontSize:12,color:t.cod,marginTop:10,whiteSpace:"pre"}}>{cur.code}</div>
          </div>
        </>:<div style={{color:t.tx3,fontSize:13,textAlign:"center",padding:"20px 0"}}>▶ 시작을 눌러 생애주기를 탐험하세요</div>}
        <Code t={t} code={`class MyViewController: UIViewController {
    override func viewDidLoad() {
        super.viewDidLoad()
        // 한 번만 호출 → 초기 설정
        setupUI(); fetchData()
    }
    override func viewWillAppear(_ animated: Bool) {
        super.viewWillAppear(animated)
        // 화면마다 호출 → 데이터 갱신
        refreshData()
    }
    override func viewDidDisappear(_ animated: Bool) {
        super.viewDidDisappear(animated)
        timer?.invalidate()  // 리소스 정리
    }
}`}/>
      </div>
    </Grid2>
  </div>;
}

// 10. ASYNC/AWAIT
function AsyncDemo({t,s}) {
  const [mode,setMode]=useState("callback");
  const [step,setStep]=useState(-1);
  const [running,setRunning]=useState(false);
  const simulate=()=>{
    setRunning(true);setStep(0);
    const delays=mode==="callback"?[600,1200,1800,2400]:[600,1100,1600,2100];
    delays.forEach((d,i)=>setTimeout(()=>{setStep(i+1);if(i===3)setRunning(false)},d));
  };
  const callbackSteps=["fetchUser() 호출","✅ user 수신 → fetchProfile(user) 호출","✅ profile 수신 → fetchFeed(profile) 호출","✅ feed 수신 → UI 업데이트 완료"];
  const asyncSteps=["await fetchUser() — 일시 정지","user 수신 → await fetchProfile(user)","profile 수신 → await fetchFeed(profile)","feed 수신 → updateUI(feed) 완료"];
  const steps=mode==="callback"?callbackSteps:asyncSteps;
  return <div className="fs" style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{display:"flex",gap:10,justifyContent:"center"}}>
      {[["callback","❌ 콜백 지옥",t.red],["async","✅ async/await",t.grn]].map(([m,l,c])=>(
        <Btn key={m} t={t} color={c} onClick={()=>{setMode(m);setStep(-1);setRunning(false)}} style={{opacity:mode===m?1:.38}}>{l}</Btn>
      ))}
    </div>
    <Grid2 t={t}>
      <Panel t={t}>
        <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>실행 흐름 시뮬레이션</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {steps.map((s,i)=>(
            <div key={i} className={step===i+1?"pi":""} style={{background:step>i?(mode==="callback"?`${t.redBg}`:`${t.grnBg}`):step===i+1?(mode==="callback"?t.redBg:t.grnBg):t.sur2,border:`1.5px solid ${step>i||step===i+1?(mode==="callback"?t.redBrd:t.grnBrd):t.bdr}`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,transition:"all .35s cubic-bezier(.34,1.2,.64,1)"}}>
              <div style={{width:22,height:22,borderRadius:"50%",background:step>i?(mode==="callback"?t.red:t.grn):step===i+1?(mode==="callback"?t.amb:t.blue):t.bdr2,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0,transition:"all .3s"}}>{step>i?"✓":i+1}</div>
              <span style={{color:step===i+1?t.tx:t.tx2,fontSize:12,lineHeight:1.5}}>{s}</span>
              {step===i+1&&running&&<div className="pu" style={{marginLeft:"auto",color:t.amb,fontSize:14}}>⏳</div>}
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <Btn t={t} color={mode==="callback"?t.red:t.grn} onClick={simulate} disabled={running} full>{running?"실행 중...":"▶ 시뮬레이션 시작"}</Btn>
          <Btn t={t} color={t.tx2} onClick={()=>{setStep(-1);setRunning(false)}}>↺</Btn>
        </div>
      </Panel>
      <div className="fs" key={mode}>
        <Code t={t} code={mode==="callback"?`// ❌ 콜백 지옥 (Pyramid of Doom)
fetchUser { user in
    fetchProfile(user) { profile in
        fetchFeed(profile) { feed in
            updateUI(feed) // 3단 중첩!
            // 에러 처리는 더 복잡해짐...
        }
    }
}`:
`// ✅ async/await - 읽기 쉬운 직선 코드
func loadContent() async throws {
    let user    = try await fetchUser()
    let profile = try await fetchProfile(user)
    let feed    = try await fetchFeed(profile)
    updateUI(feed)
    // 에러는 throws로 깔끔하게!
}`}/>
        <div style={{marginTop:14}}><InfoBox t={t} color={mode==="async"?t.grn:t.red} bg={mode==="async"?t.grnBg:t.redBg} brd={mode==="async"?t.grnBrd:t.redBrd}>
          {mode==="async"?"✅ await는 스레드를 차단하지 않고 일시 정지만 함.\n다른 작업이 그 사이 실행 가능 → 효율적!":"❌ 콜백이 깊어질수록 가독성↓, 에러 처리↓, 유지보수↓"}
        </InfoBox></div>
      </div>
    </Grid2>
  </div>;
}

// 12. NOTIFICATION CENTER
function NotifDemo({t,s}) {
  const [observers,setObservers]=useState([{id:1,name:"ProfileVC",subscribed:true,received:false},{id:2,name:"FeedVC",subscribed:true,received:false},{id:3,name:"BadgeVC",subscribed:false,received:false}]);
  const [broadcasting,setBroadcasting]=useState(false);
  const [msg,setMsg]=useState("");
  const broadcast=(m)=>{
    setBroadcasting(true);setMsg(m);
    setTimeout(()=>{
      setObservers(obs=>obs.map(o=>({...o,received:o.subscribed})));
      setTimeout(()=>{setBroadcasting(false)},600);
    },400);
  };
  const toggle=(id)=>setObservers(obs=>obs.map(o=>o.id===id?{...o,subscribed:!o.subscribed,received:false}:o));
  const reset=()=>setObservers(obs=>obs.map(o=>({...o,received:false})));
  return <div className="fs" style={{display:"flex",flexDirection:"column",gap:20}}>
    <Grid2 t={t}>
      <Panel t={t}>
        <div style={{fontWeight:600,fontSize:14}}>NotificationCenter 시뮬레이션</div>
        <div style={{background:t.sur2,border:`1.5px solid ${t.bdr}`,borderRadius:14,padding:14,textAlign:"center"}}>
          <div style={{color:t.tx3,fontSize:11,marginBottom:8}}>📡 NotificationCenter.default</div>
          <div style={{color:t.tx,fontWeight:600,fontSize:13}}>{broadcasting?`"${msg}" 방송 중...`:"대기 중"}</div>
          <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:12,flexWrap:"wrap"}}>
            <Btn t={t} color={t.blue} onClick={()=>{reset();broadcast("userDidLogin")}}>userDidLogin 방송</Btn>
            <Btn t={t} color={t.pur} onClick={()=>{reset();broadcast("dataUpdated")}}>dataUpdated 방송</Btn>
          </div>
        </div>
        <div style={{color:t.tx2,fontSize:12,marginBottom:4}}>구독자 목록 (탭으로 구독/해제)</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {observers.map(o=>(
            <div key={o.id} className={o.received?"pi":""} onClick={()=>toggle(o.id)} style={{background:o.received?t.grnBg:o.subscribed?t.blueBg:t.sur2,border:`1.5px solid ${o.received?t.grnBrd:o.subscribed?t.blueBrd:t.bdr}`,borderRadius:11,padding:"11px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,transition:"all .4s cubic-bezier(.34,1.2,.64,1)"}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:o.subscribed?(o.received?t.grn:t.blue):t.bdr2,transition:"background .3s"}}/>
              <div style={{flex:1}}>
                <div style={{color:o.received?t.grn:o.subscribed?t.blue:t.tx2,fontFamily:"monospace",fontSize:13,fontWeight:600}}>{o.name}</div>
                <div style={{color:t.tx3,fontSize:10}}>{o.subscribed?"구독 중":"구독 안 함"}</div>
              </div>
              {o.received&&<span className="pi" style={{color:t.grn,fontSize:13}}>📬 수신!</span>}
              {!o.subscribed&&<span style={{color:t.tx3,fontSize:11}}>🔇</span>}
            </div>
          ))}

// 14. GCD & DISPATCH QUEUE
function GcdDemo({t,s}) {
  const [mode,setMode]=useState("serial");
  const [tasks,setTasks]=useState([]);
  const [running,setRunning]=useState(false);
  const run=()=>{
    setRunning(true);setTasks([]);
    const ts=["Task A","Task B","Task C","Task D"];
    if(mode==="serial"){
      ts.forEach((name,i)=>{
        setTimeout(()=>setTasks(p=>[...p,{name,start:i*600,status:"running"}]),i*600);
        setTimeout(()=>setTasks(p=>p.map(x=>x.name===name?{...x,status:"done"}:x)),(i+1)*600);
      });
      setTimeout(()=>setRunning(false),ts.length*600);
    } else if(mode==="concurrent"){
      ts.forEach((name,i)=>{
        setTimeout(()=>setTasks(p=>[...p,{name,status:"running"}]),100);
        setTimeout(()=>setTasks(p=>p.map(x=>x.name===name?{...x,status:"done"}:x)),400+Math.random()*400);
      });
      setTimeout(()=>setRunning(false),1000);
    } else {
      // sync vs async
      setTasks([{name:"sync 호출",status:"running"}]);
      setTimeout(()=>{
        setTasks([{name:"sync 호출",status:"done"},{name:"🔴 메인 스레드 차단됨!",status:"blocked"}]);
        setTimeout(()=>{
          setTasks(p=>[...p.map(x=>({...x,status:"done"})),{name:"async 호출",status:"running"}]);
          setTimeout(()=>{
            setTasks(p=>p.map(x=>({...x,status:"done"})));
            setRunning(false);
          },500);
        },800);
      },600);
    }
  };
  return <div className="fs" style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
      {[["serial","Serial Queue",t.blue],["concurrent","Concurrent Queue",t.grn],["syncasync","sync vs async",t.pur]].map(([m,l,c])=>(
        <Btn key={m} t={t} color={c} onClick={()=>{setMode(m);setTasks([]);setRunning(false)}} style={{opacity:mode===m?1:.38}}>{l}</Btn>
      ))}
    </div>
    <Grid2 t={t}>
      <Panel t={t}>
        <div style={{fontWeight:600,fontSize:14}}>{mode==="serial"?"Serial Queue — 순서대로 하나씩":mode==="concurrent"?"Concurrent Queue — 동시에 여러 개":"sync vs async — 호출 방식 차이"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:6,minHeight:160}}>
          {tasks.map((tk,i)=>(
            <div key={i} className={tk.status==="done"?"pi":""} style={{background:tk.status==="blocked"?t.redBg:tk.status==="done"?t.grnBg:t.ambBg,border:`1.5px solid ${tk.status==="blocked"?t.redBrd:tk.status==="done"?t.grnBrd:t.ambBrd}`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,transition:"all .4s cubic-bezier(.175,.885,.32,1.275)"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:tk.status==="blocked"?t.red:tk.status==="done"?t.grn:t.amb}}/>
              <span style={{fontSize:13,color:tk.status==="blocked"?t.red:t.tx}}>{tk.name}</span>
              <span style={{marginLeft:"auto",fontSize:11,color:tk.status==="blocked"?t.red:tk.status==="done"?t.grn:t.amb}}>{tk.status==="blocked"?"차단":tk.status==="done"?"완료":"실행 중..."}</span>
            </div>
          ))}
          {tasks.length===0&&<div style={{color:t.tx3,fontSize:13,textAlign:"center",padding:"30px 0"}}>시뮬레이션을 시작하세요</div>}
        </div>
        <Btn t={t} color={mode==="serial"?t.blue:mode==="concurrent"?t.grn:t.pur} onClick={run} disabled={running} full>{running?"실행 중...":"▶ 시뮬레이션 시작"}</Btn>
      </Panel>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Code t={t} code={mode==="serial"?`// Serial Queue: 순서 보장, 하나씩
let serial = DispatchQueue(label: "serial")

serial.async { print("A") }  // 1번째
serial.async { print("B") }  // 2번째
serial.async { print("C") }  // 3번째
// 항상 A → B → C 순서`:mode==="concurrent"?`// Concurrent Queue: 동시 실행
let concurrent = DispatchQueue(
    label: "concurrent",
    attributes: .concurrent
)

concurrent.async { print("A") }
concurrent.async { print("B") }
concurrent.async { print("C") }
// 순서 보장 안 됨. 동시에 실행!`:`// sync: 호출한 스레드를 차단 (완료까지 대기)
DispatchQueue.global().sync {
    heavyWork()  // 메인 스레드 멈춤!
}

// async: 호출한 스레드 차단 안 함
DispatchQueue.global().async {
    heavyWork()  // 백그라운드에서
    DispatchQueue.main.async {
        updateUI()  // UI는 메인에서
    }
}`}/>
        <InfoBox t={t} color={t.blue} bg={t.blueBg} brd={t.blueBrd}>
          <b>핵심</b>: Serial은 순서 보장, Concurrent는 성능 우선.<br/>
          sync는 차단(조심!), async는 비차단.
        </InfoBox>
      </div>
    </Grid2>
  </div>;
}

function ActorDemo({t,s}) {

      let c=0;
      const addLog=(m,col)=>setLogs(p=>[...p,{m,col,id:Date.now()+Math.random()}]);
      setTimeout(()=>addLog("Thread 1: count 읽기 (0)",t.blue),200);
      setTimeout(()=>addLog("Thread 2: count 읽기 (0)",t.pur),350);
      setTimeout(()=>{addLog("Thread 1: count = 0 + 1 쓰기",t.blue);c=1;setCount(1)},600);
      setTimeout(()=>{addLog("Thread 2: count = 0 + 1 쓰기 (!!)",t.red);setCount(1)},800);
      setTimeout(()=>{addLog("💥 기대값: 2, 실제값: 1 — 데이터 레이스!",t.red);setRunning(false)},1200);
    } else {
      const addLog=(m,col)=>setLogs(p=>[...p,{m,col,id:Date.now()+Math.random()}]);
      setTimeout(()=>addLog("Task 1: actor에 접근 요청 (대기)",t.blue),200);
      setTimeout(()=>{addLog("Task 1: count = 0 + 1 (독점 접근)");setCount(1)},500);
      setTimeout(()=>addLog("Task 2: actor에 접근 요청 (대기)",t.pur),700);
      setTimeout(()=>{addLog("Task 2: count = 1 + 1 (독점 접근)");setCount(2)},1000);
      setTimeout(()=>{addLog("✅ 기대값: 2, 실제값: 2 — 안전!",t.grn);setRunning(false)},1400);
    }
  };
  return <div className="fs" style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{display:"flex",gap:10,justifyContent:"center"}}>
      {[["unsafe","❌ class (데이터 레이스)",t.red],["actor","✅ actor (안전)",t.grn]].map(([m,l,c])=>(
        <Btn key={m} t={t} color={c} onClick={()=>{setMode(m);setLogs([]);setCount(0);setRunning(false)}} style={{opacity:mode===m?1:.38}}>{l}</Btn>
      ))}
    </div>
    <Grid2 t={t}>
      <Panel t={t}>
        <div style={{fontWeight:600,fontSize:14}}>동시 접근 시뮬레이션</div>

        </div>
        <div style={{background:t.sur2,borderRadius:12,padding:12,minHeight:100}}>
          {logs.map(l=><div key={l.id} className="pi" style={{color:l.col||t.tx,fontSize:12,marginBottom:4,fontFamily:"monospace"}}>{l.m}</div>)}
          {logs.length===0&&<div style={{color:t.tx3,fontSize:12,textAlign:"center"}}>시뮬레이션을 시작하세요</div>}
        </div>
        <Btn t={t} color={mode==="unsafe"?t.red:t.grn} onClick={simulate} disabled={running} full>{running?"실행 중...":"▶ 시뮬레이션"}</Btn>
      </Panel>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Code t={t} code={mode==="unsafe"?`// ❌ class — 데이터 레이스 위험
class Counter {
    var count = 0
    func increment() {
        count += 1  // 동시 접근 시 위험!
    }
}

// 두 스레드가 동시에 읽고 쓰면
// count가 1만 될 수 있음 (기대: 2)`:`// ✅ actor — 자동 직렬화
actor Counter {
    var count = 0
    func increment() {
        count += 1  // 독점 접근 보장
    }
}

// 호출 시 await 필요

await counter.increment()  // 안전!

// Sendable: actor 간 전달 가능한 타입
struct Data: Sendable { let value: Int }`}/>
        <InfoBox t={t} color={t.pur} bg={t.purBg} brd={t.purBrd}>
          <b>Actor</b>: 내부 상태에 한 번에 하나의 Task만 접근 허용.<br/>
          <b>Sendable</b>: 동시성 경계를 넘어 안전하게 전달 가능한 타입.
        </InfoBox>
      </div>
    </Grid2>
  </div>;

          </div>
          {step>=1&&<div className="sr" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
            <div style={{background:step>=2?t.grnBg:t.ambBg,border:`2px solid ${step>=2?t.grnBrd:t.ambBrd}`,borderRadius:14,padding:"14px 20px",textAlign:"center",transition:"all .5s cubic-bezier(.175,.885,.32,1.275)"}}>
              <div style={{color:t.tx3,fontSize:10,fontFamily:"monospace"}}>var b</div>
              <div style={{color:step>=2?t.grn:t.amb,fontFamily:"monospace",fontSize:18,fontWeight:700,margin:"6px 0",transition:"all .4s"}}>{bVal}</div>
              <div style={{color:t.tx3,fontSize:10,fontFamily:"monospace",transition:"all .3s"}}>{bAddr}</div>
            </div>
          </div>}
        </div>

        {step===1&&<InfoBox t={t} color={t.amb} bg={t.ambBg} brd={t.ambBrd}>var b = a → 아직 <b>같은 메모리 공유!</b> 복사 안 함 (최적화)</InfoBox>}
        {step===2&&<InfoBox t={t} color={t.grn} bg={t.grnBg} brd={t.grnBrd}>b를 수정 → 이제서야 <b>실제 복사 발생!</b> 별도 메모리 할당</InfoBox>}
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

        </div>
      </Panel>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Code t={t} code={`var a = [1, 2, 3]

// 복사 비용 = 0 (포인터만 복사)

b.append(99)
// 이 시점: b 수정 → 실제 복사 발생!
// a = [1, 2, 3]     주소: 0xA1B2
// b = [1, 2, 3, 99] 주소: 0xC3D4

        <InfoBox t={t} color={t.blue} bg={t.blueBg} brd={t.blueBrd}>

        </InfoBox>
      </div>
    </Grid2>
  </div>;
}

function GenericsDemo({t,s}) {

          <div style={{color:t.tx3,fontSize:11,fontFamily:"monospace",marginBottom:10}}>sortArray&lt;{inputType==="int"?"Int":"String"}&gt;</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>
            {display.map((v,i)=>(
              <div key={i} className={sorted?"pi":""} style={{background:inputType==="int"?t.blueBg:t.grnBg,border:`1.5px solid ${inputType==="int"?t.blueBrd:t.grnBrd}`,borderRadius:10,padding:"8px 14px",fontFamily:"monospace",fontSize:14,fontWeight:600,color:inputType==="int"?t.blue:t.grn,transition:"all .4s cubic-bezier(.175,.885,.32,1.275)"}}>{inputType==="int"?v:`"${v}"`}</div>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {!sorted?<Btn t={t} color={inputType==="int"?t.blue:t.grn} onClick={doSort} full>정렬 실행 (같은 함수!)</Btn>:<Btn t={t} color={t.tx2} onClick={reset} full>↺ 리셋</Btn>}
        </div>
        {sorted&&<InfoBox t={t} color={t.grn} bg={t.grnBg} brd={t.grnBrd}>✅ 하나의 Generic 함수로 Int, String 모두 처리!</InfoBox>}
      </Panel>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Code t={t} code={`// 제네릭 없이: 타입마다 함수 필요 ❌
func sortInts(_ arr: [Int]) -> [Int] { ... }
func sortStrings(_ arr: [String]) -> [String] { ... }

// 제네릭으로: 하나의 함수로 모든 타입 ✅
func sortArray<T: Comparable>(_ arr: [T]) -> [T] {
    return arr.sorted()
}

sortArray([3, 1, 4])       // [1, 3, 4]
sortArray(["b", "a", "c"]) // ["a", "b", "c"]

// 제네릭 타입
struct Stack<Element> {
    private var items: [Element] = []
    mutating func push(_ item: Element) {
        items.append(item)
    }
    mutating func pop() -> Element? {
        return items.popLast()
    }
}`}/>

          Array&lt;Element&gt;, Optional&lt;Wrapped&gt; 등 Swift 핵심 타입이 모두 제네릭.
        </InfoBox>
      </div>
    </Grid2>
  </div>;
}

        showError(error)
    }

// 절대 실패하지 않을 때만 사용`}/>
      </div>
    </Grid2>

}

struct User: Codable {
    let name: String
    let age: Int
    let skills: [String]
}

// JSON → Swift (디코딩)
let json = """
{"name":"Leeo","age":28,"skills":["Swift"]}
""".data(using: .utf8)!

let user = try JSONDecoder().decode(
    User.self, from: json
)

// Swift → JSON (인코딩)

// 키 이름이 다를 때: CodingKeys

function AppLifeDemo({t,s}) {
  const [phase,setPhase]=useState(-1);
  const [auto,setAuto]=useState(false);
  const timerRef=useRef(null);
  const phases=[
    {name:"Not Running",desc:"앱이 실행되지 않은 상태",color:"#6b7280",bg:t.sur2,brd:t.bdr,tip:"사용자가 앱을 실행하지 않았거나, 시스템이 종료함"},
    {name:"Inactive",desc:"포그라운드지만 이벤트 미수신",color:t.amb,bg:t.ambBg,brd:t.ambBrd,tip:"전화 수신, 알림 센터 열기 등 일시적 상태"},
    {name:"Active",desc:"포그라운드에서 정상 실행 중",color:t.grn,bg:t.grnBg,brd:t.grnBrd,tip:"사용자가 앱을 사용 중. UI 업데이트 활발"},
    {name:"Inactive",desc:"백그라운드 전환 직전",color:t.amb,bg:t.ambBg,brd:t.ambBrd,tip:"홈 버튼/스와이프로 나가는 중"},
    {name:"Background",desc:"백그라운드 실행 중",color:t.blue,bg:t.blueBg,brd:t.blueBrd,tip:"약 5초간 작업 가능. 음악, 위치, 다운로드 등"},
    {name:"Suspended",desc:"메모리에 있지만 코드 미실행",color:t.pur,bg:t.purBg,brd:t.purBrd,tip:"메모리 부족 시 시스템이 자동 종료 가능"},
  ];
  const next=()=>setPhase(p=>Math.min(p+1,phases.length-1));
  const resetP=()=>{setPhase(-1);setAuto(false);clearInterval(timerRef.current)};
  useEffect(()=>{
    if(auto){timerRef.current=setInterval(()=>setPhase(p=>{if(p>=phases.length-1){clearInterval(timerRef.current);setAuto(false);return p;}return p+1;}),1200);}
    return()=>clearInterval(timerRef.current);
  },[auto]);
  const cur=phase>=0?phases[phase]:null;
  return <div className="fs" style={{display:"flex",flexDirection:"column",gap:20}}>

@propertyWrapper
struct Clamped {
    var wrappedValue: Int {
        didSet {
            wrappedValue = min(max(wrappedValue, min), max)
        }
    }
    let min: Int
    let max: Int

    init(wrappedValue: Int, _ range: ClosedRange<Int>) {
        self.min = range.lowerBound
        self.max = range.upperBound
        self.wrappedValue = Swift.min(
            Swift.max(wrappedValue, self.min), self.max
        )
    }
}

// 사용

    mutating func takeDamage(_ d: Int) {
        hp -= d  // 자동으로 0 이하로 안 내려감!
    }
}`}/>

function OverflowDemo({t}) {
  const [val,setVal]=useState(120);
  const [bits,setBits]=useState("01111000");
  const [overflow,setOverflow]=useState(false);
  const updateVal=(v)=>{
    const clamped=Math.max(-128,Math.min(127,v));
    if(v>127||v<-128){setOverflow(true);setTimeout(()=>setOverflow(false),1500)}
    setVal(clamped);
    // 2's complement 8-bit
    let binary=clamped>=0?clamped:256+clamped;
    setBits(binary.toString(2).padStart(8,"0"));
  };
  const [wrapVal,setWrapVal]=useState(127);
  const wrapAdd=()=>{const n=((wrapVal+1+128)%256)-128;setWrapVal(n)};
  return <div className="fs" style={{display:"flex",flexDirection:"column",gap:20}}>
    <Grid2 t={t}>
      <Panel t={t}>
        <div style={{fontWeight:600,fontSize:14}}>Int8 범위: -128 ~ 127</div>
        <div style={{display:"flex",justifyContent:"center",gap:4,marginTop:8}}>
          {bits.split("").map((b,i)=>(
            <div key={i} style={{width:36,height:44,display:"flex",alignItems:"center",justifyContent:"center",background:i===0?t.redBg:b==="1"?t.blueBg:t.sur2,border:`2px solid ${i===0?t.redBrd:b==="1"?t.blueBrd:t.bdr}`,borderRadius:8,fontFamily:"monospace",fontSize:18,fontWeight:700,color:i===0?(val<0?t.red:t.tx3):b==="1"?t.blue:t.tx3,transition:"all .3s"}}>
              {b}
            </div>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4,padding:"0 4px"}}>
          <span style={{fontSize:10,color:t.red,fontFamily:"monospace"}}>부호 비트</span>
          <span style={{fontSize:10,color:t.tx3,fontFamily:"monospace"}}>값 비트 (7비트)</span>
        </div>
        <div style={{textAlign:"center",marginTop:12}}>
          <span style={{fontFamily:"monospace",fontSize:28,fontWeight:700,color:overflow?t.red:t.blue,transition:"all .3s"}}>{val}</span>
          {overflow&&<div className="pi sk" style={{color:t.red,fontSize:12,marginTop:4}}>⚠️ Overflow! Swift에서는 크래시</div>}
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
          <Btn t={t} color={t.blue} onClick={()=>updateVal(val+1)}>+1</Btn>
          <Btn t={t} color={t.blue} onClick={()=>updateVal(val+10)}>+10</Btn>
          <Btn t={t} color={t.amb} onClick={()=>updateVal(val-1)}>-1</Btn>
          <Btn t={t} color={t.amb} onClick={()=>updateVal(val-10)}>-10</Btn>
          <Btn t={t} color={t.tx2} onClick={()=>updateVal(0)}>0</Btn>
        </div>
      </Panel>
      <Panel t={t}>
        <div style={{fontWeight:600,fontSize:14}}>Overflow 연산자 &+</div>
        <div style={{background:t.sur2,borderRadius:12,padding:16,border:`1.5px solid ${t.bdr}`,textAlign:"center"}}>

function UnicodeDemo({t}) {

  const codePoints=getCodePoints(text);
  const utf16Len=text.length;
  const charCount=[...text].length;
  const byteLen=new TextEncoder().encode(text).length;
  return <div className="fs" style={{display:"flex",flexDirection:"column",gap:20}}>

        <div style={{display:"flex",gap:8,marginTop:10}}>

        <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:10}}>
          {codePoints.map((cp,i)=>(
            <div key={i} className="pi" style={{display:"flex",alignItems:"center",gap:10,background:t.sur2,borderRadius:10,padding:"8px 12px",border:`1px solid ${t.bdr}`}}>
              <span style={{fontSize:24,minWidth:36,textAlign:"center"}}>{cp.char}</span>
              <div style={{flex:1}}>
                <div style={{fontFamily:"monospace",fontSize:11,color:t.pur}}>U+{cp.hex.join(" U+")}</div>
                <div style={{fontFamily:"monospace",fontSize:10,color:t.tx3}}>UTF-8: {cp.bytes}바이트</div>
              </div>
            </div>

        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
          {[["Hello",],["café"],["한글🇰🇷"],["👨‍👩‍👧‍👦"],["🏳️‍🌈"],["1️⃣2️⃣3️⃣"]].map(([s],i)=>(
            <button key={i} className="sb" onClick={()=>setText(s)} style={{background:t.sur2,border:`1px solid ${t.bdr}`,borderRadius:8,padding:"4px 10px",fontSize:12,color:t.tx2,cursor:"pointer"}}>{s}</button>
          ))}

let family = "👨‍👩‍👧‍👦"
family.count          // 1 (사람이 보는 글자 수)
family.utf16.count    // 11 (UTF-16 코드 유닛)
family.utf8.count     // 25 (바이트 수!)

// 왜 String.Index가 Int가 아닌가?
let str = "café"
// str[2]  ← 컴파일 에러!

// 이유: 문자마다 바이트 수가 다름
// c = 1바이트, a = 1, f = 1, é = 2
// → 정수 인덱스로 "점프" 불가능

let idx = str.index(str.startIndex, offsetBy: 2)
print(str[idx])  // "f"

// 이모지 = 여러 코드 포인트의 조합
// 👨‍👩‍👧‍👦 = 👨 + ZWJ + 👩 + ZWJ + 👧 + ZWJ + 👦

// 32. VIRTUAL MEMORY & PAGING
function VirtualMemDemo({t}) {
  const [pages,setPages]=useState([
    {id:0,virtual:"0x0000",physical:"0x8000",status:"mapped",label:"Code"},
    {id:1,virtual:"0x1000",physical:"0xA000",status:"mapped",label:"Data"},
    {id:2,virtual:"0x2000",physical:null,status:"unmapped",label:"Stack"},
    {id:3,virtual:"0x3000",physical:"0xC000",status:"mapped",label:"Heap"},
  ]);
  const [fault,setFault]=useState(null);
  const accessPage=(id)=>{
    const pg=pages.find(p=>p.id===id);
    if(pg.status==="unmapped"){
      setFault(id);
      setTimeout(()=>{
        setPages(ps=>ps.map(p=>p.id===id?{...p,physical:"0xF000",status:"mapped"}:p));
        setFault(null);
      },1200);
    }
  };
  const reset=()=>{setPages([
    {id:0,virtual:"0x0000",physical:"0x8000",status:"mapped",label:"Code"},
    {id:1,virtual:"0x1000",physical:"0xA000",status:"mapped",label:"Data"},
    {id:2,virtual:"0x2000",physical:null,status:"unmapped",label:"Stack"},
    {id:3,virtual:"0x3000",physical:"0xC000",status:"mapped",label:"Heap"},
  ]);setFault(null)};
  return <div className="fs" style={{display:"flex",flexDirection:"column",gap:20}}>
    <Grid2 t={t}>
      <Panel t={t}>
        <div style={{fontWeight:600,fontSize:14}}>페이지 테이블 (가상 → 물리)</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {pages.map(pg=>(
            <div key={pg.id} className={fault===pg.id?"pu":pg.status==="mapped"?"":""}
              style={{display:"flex",alignItems:"center",gap:8,background:fault===pg.id?t.ambBg:pg.status==="mapped"?t.grnBg:t.redBg,border:`1.5px solid ${fault===pg.id?t.ambBrd:pg.status==="mapped"?t.grnBrd:t.redBrd}`,borderRadius:10,padding:"8px 12px",cursor:"pointer",transition:"all .4s"}}
              onClick={()=>accessPage(pg.id)}>
              <div style={{flex:1}}>
                <div style={{fontFamily:"monospace",fontSize:12,fontWeight:600}}>{pg.label}</div>
                <div style={{fontFamily:"monospace",fontSize:10,color:t.tx3}}>가상: {pg.virtual}</div>
              </div>
              <span style={{color:t.tx3,fontSize:14}}>→</span>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"monospace",fontSize:12,color:pg.status==="mapped"?t.grn:t.red,fontWeight:600}}>{pg.physical||"⚠ 없음"}</div>
                <div style={{fontSize:10,color:t.tx3}}>{fault===pg.id?"Page Fault!":pg.status==="mapped"?"물리 매핑됨":"미매핑"}</div>
              </div>
            </div>
          ))}
        </div>
        {fault!==null&&<div className="pi" style={{background:t.ambBg,border:`1px solid ${t.ambBrd}`,borderRadius:10,padding:10,color:t.amb,fontSize:12,textAlign:"center"}}>Page Fault 발생! OS가 물리 메모리를 할당 중...</div>}
        <Btn t={t} color={t.tx2} onClick={reset}>↺ 리셋</Btn>
      </Panel>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Code t={t} code={`// 가상 메모리: 앱은 가상 주소만 봄
// 0x0000 ~ 0xFFFF (앱이 보는 주소)
//     ↓ 페이지 테이블 (MMU가 변환)
// 0x8000 ~ 0xFFFF (실제 RAM 주소)

// iOS 메모리 경고 → Jetsam
// 물리 메모리 부족 시:
// 1. didReceiveMemoryWarning 호출
// 2. 무시하면 → Jetsam이 앱 강제 종료

// 페이지 크기: 16KB (arm64)
// 앱의 메모리 = 페이지 단위로 관리

// Dirty Page: 수정된 페이지 (swap 불가)
// Clean Page: 읽기만 한 페이지 (해제 가능)
// → Dirty 줄이기 = 메모리 효율 핵심`}/>
        <InfoBox t={t} color={t.blue} bg={t.blueBg} brd={t.blueBrd}>
          <b>가상 메모리</b>: 각 앱은 독립된 주소 공간을 갖습니다. 다른 앱의 메모리에 접근할 수 없어 <b>앱 격리(Sandboxing)</b>의 기초.
        </InfoBox>
        <InfoBox t={t} color={t.red} bg={t.redBg} brd={t.redBrd}>
          <b>iOS는 swap 없음!</b> macOS와 달리 디스크로 페이지를 내보내지 않습니다. 메모리 부족 = 즉시 종료.
        </InfoBox>
      </div>

indirect enum BinaryTree<T> {

        )

// 재귀 탐색
func search(_ tree: BinaryTree<Int>, _ val: Int) -> Bool {
    switch tree {
    case .empty: return false
    case .node(let v, let l, let r):
        if val == v { return true }
        return val < v ? search(l, val) : search(r, val)
    }

// 재귀 순회
func count<T>(_ list: LinkedList<T>) -> Int {
    switch list {
    case .empty: return 0
    case .node(_, let next): return 1 + count(next)
    }
}

          {groups.map(g=>(
            <div key={g.label} style={{marginBottom:18}}>
              <div style={{color:t.tx3,fontSize:9,fontWeight:700,letterSpacing:1.8,paddingLeft:10,marginBottom:8}}>{g.label.toUpperCase()}</div>
              {g.ids.map(id=>{
                const c=CONCEPTS.find(x=>x.id===id);
                return <button key={id} className="ct" onClick={()=>setActive(id)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 10px",borderRadius:11,border:"none",background:active===id?t.blueBg:"transparent",color:active===id?t.blue:t.tx2,textAlign:"left",marginBottom:2,borderLeft:`3px solid ${active===id?t.blue:"transparent"}`,cursor:"pointer",transition:"all .3s cubic-bezier(.175,.885,.32,1.275)",boxShadow:active===id?`0 2px 12px ${t.blue}15`:"none"}}>
                  <span style={{fontSize:17}}>{c.emoji}</span>
                  <div><div style={{fontSize:12,fontWeight:active===id?600:400,lineHeight:1.3}}>{s.concepts[id].label}</div><div style={{fontSize:9,color:t.tx3,marginTop:1}}>{s.concepts[id].sub}</div></div>
                </button>;
              })}
            </div>
          ))}
        </nav>

        <main style={{flex:1,padding:"28px 24px",overflowY:"auto"}}>
          <div style={{marginBottom:24}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:30}}>{concept.emoji}</span>
              <div>
                <h1 style={{fontSize:22,fontWeight:700,letterSpacing:-0.5,lineHeight:1.2}}>{conceptStr.label}</h1>
                <div style={{color:t.tx2,fontSize:13,marginTop:3}}>{conceptStr.sub}</div>
              </div>
            </div>
            <div style={{height:2.5,background:`linear-gradient(90deg,${t.blue}90,transparent)`,width:150,borderRadius:2,marginTop:12}}/>
          </div>
          <div key={active} className="fs">{renderDemo()}</div>
        </main>
      </div>
    </div>
  );
}

    // Mount app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));

    // Hide loading screen
    const loader = document.getElementById('loading');
    if (loader) {
      loader.style.opacity = '0';
      setTimeout(() => loader.remove(), 500);
    }
  </script>
</body>
</html>
